<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Defender</p>
    <b>Endeavor</b>
    <strong>fortuner</strong>  
    <!-- Strong tag is important for developer -->

     <p>I am learning <strong><u>webtech</u></strong> and <strong>reactjs</strong></p>

    <i>Range Rover</i>
    <!-- Emphersized Tag -->
    <em>BMW</em>

    <u>G Wagan</u>
    <!-- Insert Tag -->
     <ins>Tesla</ins>

     <!-- Subscript Tag -->
      <h1>H<sub>2</sub>O</h1>

      <!-- Superscript Tag -->
       <h1>E=mc <sup>2</sup></h1>

       <!-- Mark Tag For Highlight by default in yewllow color -->
    <mark>Highlight</mark>
    <mark style="background-color: rgba(128, 253, 49, 0.669);">Highlight2</mark>

    <!-- Strike Tag -->
     <h1><mark><strike>2000</strike></mark><sub>999Rs</sub></h1>

     <!-- Quote Tag -->
      <q><strike>Love is Everything</strike></q><br>
      <q><mark>Money</mark>is Everything</q>

      <!-- Marquee -->
       <marquee behavior="" direction="">I am coming....</marquee>
       <marquee behavior="alternate" direction="right" scrollamount="30">I am Going</marquee>

       <marquee behavior="" direction="right" scrollamount="20">
        <img src="https://indicar.in/wp-content/uploads/2025/03/Defender.png" alt="" height="400px">
       </marquee>

       <marquee behavior="alternate" direction="up" height="400px" scrollamount="50" >
        <img src="https://png.pngtree.com/png-vector/20250708/ourmid/pngtree-orange-basketball-png-image_16721120.webp" alt="" height="200px">
       </marquee>

</body>
</html>
